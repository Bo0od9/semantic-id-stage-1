device: auto
seed: 42
epochs: 100  # H100 быстрый — можно позволить больше эпох; early stopping (patience=5) остановит раньше, если сойдётся
batch_size: 128  # SASRec чувствителен к крупным батчам: lr=2e-3 под bs=512 дал divergence (grad_norm до 74, loss растёт). Возврат к конфигурации из оригинального CPU-прогона
eval_batch_size: 512  # eval можно крупнее — там нет градиентов и обновлений
lr: 1.0e-3  # стандартный для SASRec; менять только если batch менять
weight_decay: 1.0e-2
grad_clip_norm: 1.0
eval_every: 0  # 0 → eval once per epoch
early_stopping_patience: 5
tuning_metric: ndcg@10
log_every: 50
num_workers: 8  # применяется только на CUDA; на MPS/CPU игнорируется. Подогнано под H100 (8–16 vCPU)
cudnn_deterministic: false  # true → ~−15% throughput на CUDA, ценой нестрогого воспроизведения. Для 3 сидов mean±std не критично
n_uniform_negatives: 4096
init_temperature: 0.1
max_n_pos_per_step: 0  # 0 → disabled; защита от OOM на квадратичной in-batch logits (n_pos, n_pos)
